name: Android Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17' # AGP 8.2 必须使用 JDK 17
        distribution: 'temurin'

    # 使用官方 Gradle Action 并指定版本
    # 这会绕过系统自带的 9.4.1 版本，解决 HasConvention 兼容性问题
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 8.2 # 匹配你的项目配置

    - name: Build Debug APK
      # 注意：由于没有 gradlew，这里直接调用环境里的 gradle 命令
      run: gradle assembleDebug --stacktrace

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: PassKeeper-Debug
        path: app/build/outputs/apk/debug/*.apk # 对应 settings.gradle.kts 中的 :app 模块
